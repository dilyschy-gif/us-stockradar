# .github/workflows/us_screener.yml
# US StockRadar 每日掃描 — 台灣時間 06:00（美股收盤後）
# 注意：美股夏令時間收盤 = 台灣 04:00；冬令 = 05:00
#       統一排 06:00 TWN = 22:00 UTC，兩季都安全
name: US Screener Daily Scan

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - "us_market_radar.py"
      - "us_screener.py"
      - "us_chips_proxy.py"
      - "universe.csv"
      - "requirements.txt"
      - "tests/**"
      - ".github/workflows/us_screener.yml"
  schedule:
    - cron: '0 22 * * 1-5'   # 22:00 UTC = 台灣時間 06:00（週二~週六，對應美股週一~五收盤）
  workflow_dispatch:          # 保留手動觸發

concurrency:
  group: us-stockradar-writes
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run screener
        run: python us_screener.py

      - name: Sync to Google Sheets
        env:
          GSA_JSON: ${{ secrets.GSA_JSON }}
          US_SHEET_ID: ${{ secrets.US_SHEET_ID }}
        run: python sheets_sync.py

      - name: Generate US Market Radar dashboard
        run: python us_market_radar.py

      - name: Commit data and history
        run: |
          git config user.name "us-screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git add scan_result.csv us-data.json site/
          git diff --cached --quiet || git commit -m "US scan $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Publish dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          force_orphan: true
          commit_message: "Publish US Market Radar"
